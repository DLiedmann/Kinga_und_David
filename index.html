<html lang="pl">
<head>
<!-- Open Graph / WhatsApp Vorschau -->
<meta property="og:type" content="website" />
<meta property="og:url" content="https://davidliedmann.github.io/Kinga_und_David/" />
<meta property="og:title" content="Zaproszenie na wesele – Kinga i David" />
<meta property="og:description" content="Dwa serca – Jedno „Tak" – i impreza, którą chcemy świętować razem z Wami!" />
<meta property="og:image" content="https://davidliedmann.github.io/Kinga_und_David/preview.jpg" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinga & David – 26. września 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #b8976a;
    --gold-light: #d4b896;
    --slate: #7a7a6e;
    --dark: #2c2c28;
    --cream: #faf8f5;
    --warm-white: #fff9f4;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Raleway', sans-serif;
    background: var(--cream);
    color: var(--dark);
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    background: #6b6b5f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    overflow-x: clip;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(184,151,106,0.15) 0%, transparent 60%);
  }

  .hero-date {
    font-family: 'Pinyon Script', cursive;
    font-style: normal;
    font-size: 34.3vw;
    color: var(--gold);
    writing-mode: vertical-rl;
    position: absolute;
    left: clamp(10px, 2vw, 20px);
    top: 50%;
    transform: translateY(-50%) rotate(180deg);
    opacity: 0.85;
    line-height: 0.9;
    white-space: nowrap;
    overflow: visible;
    z-index: 0;
  }

  .hero-content {
    text-align: center;
    padding: 2rem 2rem 2rem clamp(180px, 32vw, 380px);
    animation: fadeInUp 1.2s ease forwards;
    position: absolute;
    bottom: 8%;
    left: 0;
    right: 0;
  }

  .hero-names {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(3rem, 10vw, 6rem);
    color: white;
    letter-spacing: 0.15em;
    line-height: 1;
  }

  .hero-und {
    font-family: 'Pinyon Script', cursive;
    font-style: normal;
    font-weight: 400;
    font-size: clamp(2rem, 5vw, 3.2rem);
    color: var(--gold-light);
  }

  .hero-tagline {
    margin-top: 2rem;
    font-size: clamp(0.6rem, 1.6vw, 0.85rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
    text-align: right;
    display: block;
    white-space: nowrap;
    line-height: 1.8;
  }

  .hero-scroll {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: rgba(255,255,255,0.5);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: bounce 2s ease infinite;
  }

  .hero-scroll::after {
    content: '';
    width: 1px;
    height: 40px;
    background: rgba(255,255,255,0.4);
    display: none;
  }

  /* PHOTO SECTION */
  .photo-section {
    background: white;
    padding: 5rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .couple-photo {
    width: min(520px, 75vw);
    aspect-ratio: unset;
    height: auto;
  }

  .section-label {
    font-family: 'Pinyon Script', cursive;
    font-style: normal;
    font-size: clamp(2.5rem, 6vw, 4rem);
    color: var(--slate);
    margin-bottom: 2.5rem;
    text-align: center;
  }

  /* PROGRAMM */
  .programm {
    background: #6b6b5f;
    padding: 5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  .timeline {
    width: min(600px, 90vw);
    position: relative;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  }

  .timeline-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1rem;
    padding: 1.5rem 0 1.5rem 2rem;
    border-bottom: 1px solid rgba(184,151,106,0.2);
    position: relative;
  }

  .timeline-item::before {
    content: '';
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    position: absolute;
    left: -4px;
    top: 50%;
    transform: translateY(-50%);
  }

  .timeline-item:last-child { border-bottom: none; }

.timeline-title {
    font-size: 0.8rem;
    letter-spacing: 0.1,5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.2rem;
    font-weight: 500;
}

  .timeline-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: rgba(255,255,255,0.85);
  }

  /* INFO GRID */
  .info-section {
    background: #6b6b5f;
    padding: 5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .info-section .section-label, .programm .section-label { color: var(--gold-light); }

  .info-grid {
    width: min(700px, 90vw);
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 2.5rem;
  }

  .info-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(184,151,106,0.3);
    padding: 1.8rem;
  }

  .info-card-label {
    font-size: 0.8rem;
    letter-spacing: 0.1,5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.2rem;
    font-weight: 500;
  }

  .info-card-content {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: rgba(255,255,255,0.85);
    line-height: 1.6;
  }

  .info-card-content a {
    color: var(--gold-light);
    text-decoration: none;
  }

  /* RSVP SECTION */
  .rsvp-section {
    background: var(--warm-white);
    padding: 5rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .rsvp-intro {
    max-width: 500px;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--slate);
    line-height: 1.8;
    margin-bottom: 3rem;
  }

  .rsvp-form {
    width: min(500px, 90vw);
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--slate);
    font-weight: 500;
  }

  .form-input, .form-select, .form-textarea {
    border: 1px solid rgba(184,151,106,0.4);
    background: white;
    padding: 0.8rem 1rem;
    font-family: 'Raleway', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
    border-radius: 0;
    -webkit-appearance: none;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--gold);
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .rsvp-options {
    display: flex;
    gap: 1rem;
  }

  .rsvp-option {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.9rem;
    border: 1px solid rgba(184,151,106,0.4);
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--slate);
    background: white;
    transition: all 0.2s;
  }

  .rsvp-option input { display: none; }

  .rsvp-option.selected-yes {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
  }

  .rsvp-option.selected-no {
    background: var(--slate);
    border-color: var(--slate);
    color: white;
  }

  .submit-btn {
    background: var(--gold);
    color: white;
    border: none;
    padding: 1rem 2rem;
    font-family: 'Raleway', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 0.5rem;
  }

  .submit-btn:hover { background: #a07d52; }

  .success-msg {
    display: none;
    text-align: center;
    padding: 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    color: var(--gold);
  }

  /* FOOTER */
  footer {
    background: var(--dark);
    padding: 2.5rem;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(255,255,255,0.4);
  }

  footer span { color: var(--gold); }

  /* ANIMATIONS */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(8px); }
  }

  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .hero-date { font-size: 34.3vw; left: 5px; }
  }

  .lock-deco {
    position: absolute;
    top: 2.5rem;
    right: clamp(1rem, 5vw, 4rem);
    width: clamp(90px, 15vw, 140px);
    opacity: 0.7;
    transform: rotate(8deg);
    pointer-events: none;
    z-index: 0;
  }
  .lock-deco img {
    width: 100%;
    border-radius: 8px;
    display: block;
  }
  .rsvp-section > *:not(.lock-deco) {
    position: relative;
    z-index: 1;
  }
</style>

</head>

  <div class="hero-content">
    <div class="hero-names">
      <div class="hero-name">KINGA</div>
      <div class="hero-und">i</div>
      <div class="hero-name">DAVID</div>
    </div>
    <p class="hero-tagline">Dwa serca &ndash; Jedno &bdquo;Tak&rdquo;<br>i impreza, którą chcemy<br>świętować razem z Wami!</p>
  </div>
  <div class="hero-scroll">Przewiń</div>
</section>
